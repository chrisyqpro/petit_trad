name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / cpu-only
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node toolchain
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install markdown and shell formatters
        run: npm install --global prettier markdownlint-cli2

      - name: Install shell tooling on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Install shell tooling on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck shfmt

      - name: Verify script
        run: ./scripts/check.sh

      - name: Runtime smoke harness
        run: ./scripts/smoke.sh

      - name: Harness script syntax
        run: sh -n scripts/eval.sh scripts/eval-capture.sh

      - name: Harness help interfaces
        run: |
          ./scripts/eval.sh --help
          ./scripts/eval-capture.sh --help
