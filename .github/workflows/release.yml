name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.artifact_name }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - artifact_name: linux-x64
            os: ubuntu-latest
            features: cpu-only
            archive_ext: tar.gz
            install_cuda: false
          - artifact_name: linux-x64-cuda
            os: ubuntu-22.04
            features: cuda
            archive_ext: tar.gz
            install_cuda: true
          - artifact_name: macos-arm64-metal
            os: macos-latest
            features: metal
            archive_ext: tar.gz
            install_cuda: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install CUDA toolkit
        if: matrix.target.install_cuda
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"
          log-file-suffix: "${{ matrix.target.artifact_name }}.txt"

      - name: Show CUDA compiler version
        if: matrix.target.install_cuda
        run: nvcc -V

      - name: Build CUDA release binary
        if: matrix.target.install_cuda
        env:
          CUDACXX: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/bin/nvcc
          CUDAToolkit_ROOT: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
        run: cargo build --release -p petit-tui --features ${{ matrix.target.features }}

      - name: Build release binary
        if: ${{ !matrix.target.install_cuda }}
        run: cargo build --release -p petit-tui --features ${{ matrix.target.features }}

      - name: Package artifact
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          artifact_name="petit-${version}-${{ matrix.target.artifact_name }}"
          mkdir -p dist
          cp target/release/petit "dist/petit"
          tar -czf "${artifact_name}.${{ matrix.target.archive_ext }}" -C dist petit

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: petit-${{ matrix.target.artifact_name }}
          path: >-
            petit-${{ github.ref_name }}-${{ matrix.target.artifact_name }}.${{
            matrix.target.archive_ext }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
